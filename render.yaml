services:
  - type: web
    name: moodfix-backend
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: python backend/run.py
    envVars:
      - key: FLASK_DEBUG
        value: "0"
      - key: DATABASE_PATH
        value: backend/data/moodfix.db
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: TMDB_READ_ACCESS_TOKEN
        sync: false
    postDeployCommand: python backend/scripts/ingest.py

  - type: web
    name: moodfix-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
